<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/dot-luv/jquery-ui.min.css"
          integrity="sha512-JhmkwQ+HmKwPLrSYGCXmiC8t50+ig0ywEeweOMAqLCJe3XcAkGRAYQSe/Udpd07nJjHCx4QQ/vyCzwKJydsYyA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/dot-luv/theme.min.css"
          integrity="sha512-DBOXJJIO/SsHuebZsr21dAAe8g4/7bJKQoPjeehY9MW1bZ1DAqoP9b/l+jCqYfTk+xqN0HksTk0HM0SL2qwbcw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace
        }
        * {
            font-family: monospace
        }
        fieldset {
            border-radius: 1em;
        }
        ul>li {
            display:flex;
            justify-content: space-between;
        }
        .jobs {
        }
        ul.sortable {
            min-height: 2em;
            border: thin white solid;
            border-radius: 1em;
            padding: 1em;
            min-width: 15em
        }
        .appears-female {
            color: pink
        }
        .appears-male {
            color: skyblue
        }
        h3 {
            border-bottom: thin white solid
        }
        fieldset>legend {
            font-size: larger
        }
        label {
            display:block;
        }
    </style>
</head>
<body>

    <div id="tabs">
        <ul>
            <li><a href="#tabs-journal">Journal</a></li>
            <li><a href="#tabs-guild">Guild</a></li>
            <li id="tab-new"><a href="#tabs-new">&lt;new&gt;</a></li>
        </ul>
        <div id="tabs-journal">
            <div>All the things you SHOULD do...</div>
            <div><label><input type="checkbox"> Buy a home </label></div>
            <div><label><input type="checkbox"> Get Busy and make some coin </label></div>
            <div><label><input type="checkbox"> Buy a few slaves to do the work </label></div>
            <div><label><input type="checkbox"> .... </label></div>
            <div><label><input type="checkbox"> profit </label></div>
        </div>
        <div id="tabs-guild" style="display: flex">
            <div class="jobs">
                <div class="job">
                    <h3>
                        <span>Auction</span>
                        <small style="float:right"></small>
                    </h3>
                    <div>
                        <ul id="auction" class="sortable">
                        </ul>
                    </div>
                </div>

                <div class="job">
                    <h3>
                        <span>Homeless</span>
                        <small style="float:right"></small>
                    </h3>
                    <div>
                        <ul id="homeless" class="sortable">
                            <li class="slave">
                                <span style='min-width: 40%'>Whiskey</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-mars appears-male'></i>
                                </span>
                            </li>
                            <li class="slave">
                                <span style='min-width: 40%'>Brandy</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-venus appears-female'></i>
                                </span>
                            </li>
                            <li class="slave">
                                <span style='min-width: 40%'>Gabby</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-venus appears-male'></i>
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="jobs">
            </div>
        </div>
        <div id="tabs-new">

        </div>
    </div>

    <div id="dlgPerson" title="Profile">
        <div>
            <div class="tabs">
                <ul>
                    <li><a href="#tabs-stats">Stats</a></li>
                    <li><a href="#tabs-options">Options</a></li>
                </ul>
                <div id="tabs-stats">
                    <div>
                        <label for="personName">Name</label>
                        <input id="personName" name="personName" type="text" value="Gabby" style="text-indent: 1em">
                    </div>
                    <div>
                        <label>Race</label>
                        <div style="text-indent: 2em">Raccoon</div>
                    </div>

                    <div>
                        <label>Gender</label>
                        <div style="text-indent: 2em">Andromorph</div>
                    </div>


                    <div>
                        <label>Sire</label>
                        <div style="padding-left: 2em" class="slave">
                            <span style='min-width: 40%'>Whiskey</span>
                            <span style='min-width: 20%'>Adult</span>
                            <span>Raccoon</span>
                            <span>
                            <i class='fa-solid fa-mars appears-male'></i>
                        </span>
                        </div>
                    </div>


                    <div>
                        <label>Dame</label>
                        <div style="padding-left: 2em" class="slave">
                            <span style='min-width: 40%'>Brandy</span>
                            <span style='min-width: 20%'>Adult</span>
                            <span>Raccoon</span>
                            <span>
                            <i class='fa-solid fa-venus appears-female'></i>
                        </span>
                        </div>
                    </div>
                    <div>
                        <label>Traits</label>
                        <div style="padding-left: 2em">
                            Incest
                        </div>
                    </div>
                </div>
                <div id="tabs-options">
                    <div>
                        <label for="personJob">Job</label>
                        <select id="personJob" name="personJob" class="selectmenu">
                            <optgroup label="Guild">
                                <option>Auction</option>
                                <option selected>Homeless</option>
                            </optgroup>
                        </select>
                    </div>

                    <fieldset>
                        <legend>Sex Acts</legend>
                        <label><input type="checkbox"> Vaginal</label>
                        <label><input type="checkbox"> Anal</label>
                        <label><input type="checkbox"> Oral</label>
                        <label><input type="checkbox"> Breasts</label>
                    </fieldset>
                </div>

            </div>
            <div>


            </div>
        </div>
    </div>

    <script src="//code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="//code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>
    <script src="/game/index.js" type="text/javascript" lang="JavaScript"></script>
    <script>
        $(function() {
            $("ul.sortable").sortable({
                connectWith: ".sortable"
            });
            $("#tabs, .tabs").tabs();
            $("#dlgPlace").dialog({
                autoOpen: false,
                height: "auto",
                modal: true,
                buttons: {
                    "Purchase": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#tab-new").on("click", function() {
                $("#dlgPlace").dialog("open");
            });
            $("#dlgRoom").dialog({
                autoOpen: false,
                height: "auto",
                modal: true,
                buttons: {
                    "Purchase": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#dlgPerson").dialog({
                autoOpen: false,
                height: "auto",
                width: "auto",
                modal: true,
                buttons: {
                    "Save": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#tabs>ul").sortable();
            $(".selectmenu").selectmenu({
                width: "auto"
            });

            $(document).on("click", ".slave", function() {
                var el = $(this);
                console.log(el);
                $("#dlgPerson").dialog("open");
            });
        });

        </script>
</body>
</html>
