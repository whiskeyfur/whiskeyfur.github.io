<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" crossorigin="anonymous" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" crossorigin="anonymous" href="//cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" crossorigin="anonymous" href="//cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">
    <style>
        .sortable {
            min-height: 1em
        }
        .sortable>* {
            cursor: grab;
        }
        body.sortmode .sortable {
            outline:thin black dashed;
        }
        .ui-state-highlight {
            min-height: 1em;
        }
    </style>
</head>
<body>
<div style="display: flex; justify-content: space-evenly">
    <div>
        <h1>Col1</h1>
        <div class="sortable">
            <div>User 1</div>
            <div>User 2</div>
            <div>User 3</div>
            <div>User 4</div>
            <div>User 5</div>
            <div>User 6</div>
        </div>
    </div>

    <div>
        <h1>Col2</h1>
        <div class="sortable">
        </div>
    </div>
</div>
    <script crossorigin="anonymous" src="//code.jquery.com/jquery-3.6.0.js"></script>
    <script crossorigin="anonymous" src="//code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <script crossorigin="anonymous" src="//cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let config = [];
        $(function() {
            $.ajax({
                url: "config.json",
                success: function(data, status, xhr) {
                    config = data;
                    localStorage.setItem("data", JSON.stringify(data));
                }
            });
            $(".sortable").sortable({
                connectWith: ".sortable",
                placeholder: "ui-state-highlight",
                start: function(event, ui) {
                    $("body").addClass("sortmode");
                    console.log(ui);
                },
                stop: function(event, ui) {
                    $("body").removeClass("sortmode");
                    console.log(ui);
                }
            });
        } );
    </script>
</body>
</html>
