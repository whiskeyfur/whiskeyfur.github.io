<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trader</title>
    <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/dot-luv/jquery-ui.min.css"
          integrity="sha512-JhmkwQ+HmKwPLrSYGCXmiC8t50+ig0ywEeweOMAqLCJe3XcAkGRAYQSe/Udpd07nJjHCx4QQ/vyCzwKJydsYyA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/dot-luv/theme.min.css"
          integrity="sha512-DBOXJJIO/SsHuebZsr21dAAe8g4/7bJKQoPjeehY9MW1bZ1DAqoP9b/l+jCqYfTk+xqN0HksTk0HM0SL2qwbcw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace
        }
        * {
            font-family: monospace
        }
        fieldset {
            border-radius: 1em;
        }
        ul>li {
            display:flex;
            justify-content: space-between;
        }
        .jobs {
        }
        ul.sortable {
            min-height: 2em;
            border: thin white solid;
            border-radius: 1em;
            padding: 1em;
            min-width: 15em
        }
        .appears-female {
            color: pink
        }
        .appears-male {
            color: skyblue
        }
        h3 {
            border-bottom: thin white solid
        }
        fieldset>legend {
            font-size: larger
        }
        .ui-menu-item {
            padding-left: 2em
        }
    </style>
</head>
<body>

    <div id="tabs">
        <ul>
            <li><a href="#tabs-guild">Guild</a></li>
            <li id="tab-new"><a href="#tabs-new">&lt;new&gt;</a></li>
        </ul>
        <div id="tabs-guild" style="display: flex">
            <div class="jobs">
                <div class="job">
                    <h3>
                        <span>Auction</span>
                        <small style="float:right"></small>
                    </h3>
                    <div>
                        <ul id="auction" class="sortable">
                        </ul>
                    </div>
                </div>

                <div class="job">
                    <h3>
                        <span>Homeless</span>
                        <small style="float:right"></small>
                    </h3>
                    <div>
                        <ul id="homeless" class="sortable">
                            <li>
                                <span style='min-width: 40%'>Whiskey</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-mars appears-male'></i>
                                </span>
                            </li>
                            <li>
                                <span style='min-width: 40%'>Brandy</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-venus appears-female'></i>
                                </span>
                            </li>
                            <li>
                                <span style='min-width: 40%'>Gabby</span>
                                <span style='min-width: 20%'>Adult</span>
                                <span>Raccoon</span>
                                <span>
                                    <i class='fa-solid fa-venus appears-male'></i>
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="jobs">

            </div>
        </div>
        <div id="tabs-new"></div>
    </div>

    <div id="dlgPlace" title="New Place">
        <div>
            <label for="placeType">Type</label>
            <select id="placeType" name="placeType">
                <optgroup label="Private Residence">
                    <option>House</option>
                    <option>Manor</option>
                    <option>Castle</option>
                </optgroup>

                <optgroup label="Business">
                    <option>Brothel</option>
                    <option>Clinic</option>
                    <option>Farm</option>
                    <option>Studio</option>
                </optgroup>
            </select>
        </div>
        <div>
            <label for="placeName">Name</label>
            <input type="text" name="placeName" id="placeName">
        </div>
    </div>
    <div id="dlgRoom" title="New Place">
        <label for="roomType">Room Type</label>
        <select id="roomType" name="roomType">
            <optgroup label="Bedrooms">
                <option>Bedroom</option>
                <option>Barracks</option>
                <option>Common Room</option>
            </optgroup>

            <optgroup label="Work">
                <option>Cleaning</option>
                <option>Training</option>
                <option>Reception</option>
            </optgroup>
        </select>
    </div>

    <div id="dlgPerson" title="Profile">
        <div>
            <label for="personName">Name</label>
            <input id="personName" name="personName" type="text">
        </div>
        <div>
            <label for="personRace">Race</label>
            <select id="personRace" name="personRace" class="selectmenu">
                <optgroup label="Human">
                    <option value="human">Human</option>
                </optgroup>
                <optgroup label="Feline">
                    <option value="cat">Cat</option>
                    <option value="cougar">Cougar</option>
                    <option value="lynx">Lynx</option>
                    <option value="tiger">Tiger</option>
                </optgroup>
                <optgroup label="Canine">
                    <option value="dog">Dog</option>
                    <option value="wolf">Wolf</option>
                </optgroup>
                <optgroup label="Raccoon">
                    <option value="raccoon">Raccoon</option>
                    <option value="cacomistle">Cacomistle</option>
                </optgroup>
            </select>
        </div>

        <div>
            <label for="personGender">Gender</label>
            <select id="personGender" name="personGender" class="selectmenu">
                <option value="male"    ><i class="fa-solid  fa-mars   appears-male  "></i> Male</option>
                <option value="female"  ><i class="fa-solid  fa-venus  appears-male  "></i> Female</option>
                <!--
                <option value="cuntboy" ><i class="fa-solid  fa-mars   appears-female"></i> Cuntboy</option>
                <option value="dickgirl"><i class="fa-solid  fa-venus  appears-female"></i> Dickgirl</option>
                -->
            </select>
        </div>


        <div>
            <label for="personSire">Sire</label>
            <select id="personSire" name="personSire" class="selectmenu">
                <option></option>
            </select>
        </div>


        <div>
            <label for="personDame">Dame</label>
            <select id="personDame" name="personDame" class="selectmenu">
                <option></option>
            </select>
        </div>
    </div>

    <script src="//code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="//code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>
    <script src="/game/index.js" type="text/javascript" lang="JavaScript"></script>
    <script>
        $(function() {
            $("ul.sortable").sortable({
                connectWith: ".sortable"
            });
            $("#tabs").tabs();
            $("#dlgPlace").dialog({
                autoOpen: false,
                height: "auto",
                width: 400,
                modal: true,
                buttons: {
                    "Purchase": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#tab-new").on("click", function() {
                $("#dlgPlace").dialog("open");
            });
            $("#dlgRoom").dialog({
                autoOpen: false,
                height: "auto",
                width: 400,
                modal: true,
                buttons: {
                    "Purchase": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#dlgPerson").dialog({
                autoOpen: false,
                height: "auto",
                width: 400,
                modal: true,
                buttons: {
                    "Purchase": function() {
                        $( this ).dialog( "close" );
                    },
                    "Sell": function() {
                        $( this ).dialog( "close" );
                    },
                    Cancel: function() {
                        $( this ).dialog( "close" );
                    }
                }
            });
            $("#tabs>ul").sortable();
            $(".selectmenu").selectmenu();
            let timer = setInterval(function() {

            });
        });

        </script>
</body>
</html>
